name: Build for Render

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build site
        run: npm run build

      - name: Publish dist to render-deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: render-deploy
          folder: dist
          clean: true
          commit-message: Deploy built site for Render